<article class="product-grid-card">
    <a href="{% url 'product_detail' pk=product.id %}" class="product-grid-card__link">
        <div class="product-grid-card__media">
            {% if product.product_image %}
            <img src="{{ product.product_image }}" alt="{{ product.name }}" loading="lazy">
            {% else %}
            <div class="product-grid-card__placeholder" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M21 19V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2ZM8.5 13.5l2.5 3 3.5-4.5 4.5 6H5l3.5-4.5Z"/></svg>
                <span>No image</span>
            </div>
            {% endif %}
            <span class="product-grid-card__overlay">
                <span class="product-grid-card__cta">View product</span>
            </span>
        </div>
        <div class="product-grid-card__body">
            {% if product.category %}
            <span class="product-grid-card__category">{{ product.category }}</span>
            {% endif %}
            <h3 class="product-grid-card__title">{{ product.name }}</h3>
            <div class="product-grid-card__footer">
                <span class="product-grid-card__price">₹{{ product.price }}</span>
            </div>
        </div>
    </a>
</article>
