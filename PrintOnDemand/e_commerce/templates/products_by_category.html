{% extends 'base.html' %}

{% block title %}Products by Category{% endblock %}

{% block content %}
<div class="category-container">
    <h1 class="page-heading">Products in {{ category.name }}</h1>
    {% if product_data %}
    {% include 'includes/product_grid.html' %}
    {% else %}
    <p class="empty-state">No products in this category yet. <a href="{% url 'home' %}">Browse all products</a></p>
    {% endif %}
</div>
{% endblock %}
